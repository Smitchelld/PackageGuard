
<!DOCTYPE html><html><head><title>Login</title><meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<style>body{background:#f8f9fa; display:flex; align-items:center; height:100vh; justify-content:center;}</style></head>
<body><div class="card p-4 shadow" style="width:350px;"><h3 class="text-center mb-3">PackageGuard</h3>
{% if msg %}<div class="alert alert-danger">{{msg}}</div>{% endif %}
<form method="post"><div class="mb-3"><input name="login" class="form-control" placeholder="Login" required></div>
<div class="mb-3"><input type="password" name="password" class="form-control" placeholder="Hasło" required></div>
<button class="btn btn-primary w-100 mb-2">Zaloguj</button><a href="/register" class="btn btn-outline-secondary w-100">Zarejestruj</a></form></div></body></html>
